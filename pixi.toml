[workspace]
name = "template-bind-cpp-python"
version = "0.1.0"
description = "C++ Development Environment"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
# C++17 minimum requirement: clang >= 5.0, gcc >= 7.0
clang = "==21.1.1"           # Latest stable version - available on all platforms
lld = "==21.1.1"             # LLVM linker
clang-tools = "==21.1.1"     # Includes: clang-tidy, clang-format, clangd
cppcheck = "==2.18.3"        # Static analysis tool
cmake = "==4.1.1"            # Build system generator
ninja = "==1.13.1"           # Build system
typos = ">=1.36.3,<2"        # Spell checker
ccache = ">=4.10.0,<5"       # C/C++ compiler cache
llvm-tools = "==21.1.1"      # LLVM tools (includes llvm-cov for coverage analysis)
clangxx = "==21.1.1"         # Provides clang++ for coverage builds (Linux)

[target.linux-64.dependencies]
gcc = "==15.1.0"                      # GCC compiler
gxx = "==15.1.0"                      # G++ compiler
mold = "==2.40.4"                     # Fast linker
libgcc-ng = "==15.1.0"               # GCC runtime library
libstdcxx-ng = "==15.1.0"            # C++ standard library
compiler-rt_linux-64 = "==21.1.1"    # Clang runtime libraries (ASan, coverage, etc.)
# Note: valgrind is NOT listed here.
# conda-forge valgrind cannot inspect binaries that use the system dynamic linker
# (/lib64/ld-linux-x86-64.so.2). Install valgrind via the system package manager instead:
#   sudo apt-get install valgrind   # Ubuntu/Debian

[target.linux-64.tasks.valgrind]
cmd = "ctest --test-dir build -T memcheck --output-on-failure"

[target.linux-64.tasks.asan]
cmd = """
cmake --preset=asan &&
cmake --build build-asan &&
ctest --test-dir build-asan
"""
env = { CC = "gcc", CXX = "g++" }

[target.linux-64.tasks.coverage]
cmd = """
cmake --preset=coverage -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ &&
cmake --build build-coverage --target coverage
"""

[tasks]
# ---- normal workflow ----
config = "cmake --preset=release"
config-debug = "cmake --preset=debug"

build = "cmake --build build -j 8"
test = "ctest --test-dir build --verbose"

clean = """
cmake --build build --target clean || true &&
cmake --build build-asan --target clean || true &&
cmake --build build-coverage --target clean || true
"""

# ---- quality ----
format = "cmake --build build --target format"
lint = "cmake --build build --target lint"
run-cppcheck = "cmake --build build --target run-cppcheck"

fullcheck = "pixi run typos && pixi run lint && pixi run run-cppcheck"
